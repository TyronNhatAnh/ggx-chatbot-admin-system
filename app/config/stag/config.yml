# Staging environment config.
# Values marked VAULT_DATA are injected by Vault at deploy time.

app_env: stag

# ---------------------------------------------------------------------------
# Gemini models
# ---------------------------------------------------------------------------
model_name: gemini-3-flash-preview
pro_model_name: gemini-3.1-pro-preview

# ---------------------------------------------------------------------------
# Vertex AI
# ---------------------------------------------------------------------------
vertex_ai_credentials_file: app/config/stag/vertex-ai.json
vertex_ai_sa_key: gemini-kr-sa-staging
vertex_ai_location: global

# ---------------------------------------------------------------------------
# Downstream service URLs
# ---------------------------------------------------------------------------
user_service_base_url: https://stag-api.gogox.co.kr/user
order_service_base_url: https://stag-api.gogox.co.kr/order
driver_service_base_url: https://stag-api.gogox.co.kr/driver
common_service_base_url: https://stag-api.gogox.co.kr/common

# ---------------------------------------------------------------------------
# Chat guardrails
# ---------------------------------------------------------------------------
chat_auth_enabled: true
chat_api_key: VAULT_DATA
chat_rate_limit_enabled: true
chat_rate_limit_requests: 30
chat_rate_limit_window_seconds: 60

# ---------------------------------------------------------------------------
# Session persistence (Redis)
# ---------------------------------------------------------------------------
redis_url: VAULT_DATA

# ---------------------------------------------------------------------------
# Context caching (requires versioned model name, e.g. gemini-2.0-flash-001)
# ---------------------------------------------------------------------------
context_caching_enabled: false
