version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env          # Loads GEMINI_API_KEY and any other vars from your .env file
    volumes:
      - .:/app        # Mount source code so changes reflect without rebuilding
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
