feature:
  name: feature_name_here
  description: >
    One-paragraph summary of this feature's business intent and scope.

  # Backend files to collect (relative to be_repo_path).
  # Keep globs specific to reduce token size and improve precision.
  be_files:
    - internal/api/http/v1/example_handler.go
    - internal/domain/example/**/*.go
    - internal/model/example*.go

  # Frontend files to collect (relative to fe_repo_path).
  fe_files:
    - src/lib/apis/example.ts
    - src/containers/example/**/*.ts
    - src/containers/example/**/*.tsx
    - src/pages/example*.tsx

  # Endpoints expected in this feature scope.
  api_scope:
    - GET /example
    - POST /example

  # Go types expected in this feature scope.
  go_types:
    - ExampleRequest
    - ExampleResponse
    - ExampleEntity

  # TypeScript types expected in this feature scope.
  ts_types:
    - ExampleRequest
    - ExampleResponse
    - ExampleModel

  # Business terms that must appear in requirement/spec docs.
  business_terms:
    - actor
    - trigger
    - validation
    - pricing
    - error code
